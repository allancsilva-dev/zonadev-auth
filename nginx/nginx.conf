user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Remove versão do Nginx dos headers e páginas de erro
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ─── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1000;
    gzip_types text/html text/css application/javascript application/json;

    # ─── Proxy Timeouts ────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ─── Rate Limiting ─────────────────────────────────────────────────────────
    # AVISO: Rate limit usa $binary_remote_addr (IP direto).
    # Se este servidor ficar atrás de Cloudflare ou CDN, o IP real vem em
    # $http_cf_connecting_ip (Cloudflare) ou $http_x_forwarded_for.
    # Nesse cenário o rate limit seria aplicado ao IP do CDN, não do usuário.
    # Ver docs/security.md seção "Rate Limit atrás de CDN".
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

    # ─── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Permite renovação de certificados pelo Certbot (challenge HTTP-01)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name auth.seudominio.com;

        # Certificados TLS — gerados pelo Certbot no host e montados como volume
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Protocolos e ciphers modernos
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # ─── Headers de Segurança ───────────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                            always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-XSS-Protection          "1; mode=block"                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"   always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CSP configurada para Next.js App Router standalone sem dependências externas.
        # ATENÇÃO: Qualquer serviço externo adicionado exige atualização desta política.
        # Exemplos comuns em docs/security.md seção "Atualizando a CSP".
        #
        # Serviços que quebrarão sem atualização da CSP:
        #   Google Fonts, Analytics, reCAPTCHA, CDN externo, OAuth providers
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # ─── Rotas de Autenticação (Backend) ────────────────────────────────────
        # Rate limit restritivo: 3r/s — proteção contra força bruta de credenciais
        location = /auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /auth/refresh {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /auth/forgot-password {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Demais Rotas do Backend ─────────────────────────────────────────────
        # Rate limit moderado: 10r/s
        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # JWKS — público, sem rate limit, com cache longo
        location /.well-known/ {
            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health — sem rate limit (monitoramento externo)
        location = /health {
            proxy_pass         http://backend:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Frontend (Next.js) ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Suporte a WebSocket para HMR (dev apenas — remover em prod se necessário)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
